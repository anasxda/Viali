<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#071f2b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VIALI Scan" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <title>VIALI Offline Scanner</title>
  </head>
  <body>
    <main class="shell">
      <header>
        <div class="mark">▦</div>
        <div><small>VIALI HOME</small><h1>Offline Scanner</h1><p>Private on-device trial</p></div>
      </header>

      <section class="card scanner">
        <div id="camera-wrap" hidden>
          <video id="video" playsinline muted></video>
          <div class="target"><span></span></div>
          <p class="camera-help">Hold a barcode inside the frame</p>
        </div>
        <button id="scan" class="primary">Open camera scanner</button>
        <button id="stop" class="secondary" hidden>Stop camera</button>
        <p id="status" class="status" role="status">Ready to scan. No data is sent anywhere.</p>
        <form id="manual-form">
          <input id="manual" autocomplete="off" autocapitalize="off" placeholder="Or enter a barcode" aria-label="Barcode" />
          <button class="secondary" type="submit">Add</button>
        </form>
      </section>

      <section id="result" class="card result" hidden>
        <div class="check">✓</div><div><small>LAST SCAN</small><strong id="last-code"></strong></div>
      </section>

      <section class="card history-card">
        <div class="section-title"><h2>Scan history</h2><button id="clear" class="text-button" hidden>Clear</button></div>
        <p id="empty">Scanned codes will stay here on this iPhone.</p>
        <div id="history"></div>
      </section>
    </main>
    <script type="module" src="/src.ts"></script>
  </body>
</html>
